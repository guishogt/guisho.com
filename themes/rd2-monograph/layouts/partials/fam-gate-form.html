<div id="fam-gate" class="gate">
  <p class="gate-note">Este contenido es privado.</p>
  <form id="fam-form" class="gate-form" autocomplete="off">
    <input id="fam-pass" class="gate-input" type="password" placeholder="Contraseña" aria-label="Contraseña" required>
    <button class="gate-btn" type="submit">Entrar</button>
  </form>
  <p id="fam-error" class="gate-error" hidden>No es esa. Intenta de nuevo.</p>
</div>
